        { name: "前端JS+收拾", weight: 2 },
        { name: "前端项目学习", weight: 1 },
        { name: "后端学习", weight: 5 },
        { name: "AI 学习", weight: 5 },
      ];

      let countdownInterval = null;
      let endTime = null;

      function generateRandomTime() {
        return Math.floor(Math.random() * 3601) + 1800; // 30分钟-1.5小时
      }

      // 格式化总时间为中文描述
      function formatTotalTime(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        if (h > 0 && m > 0) return `${h}小时${m}分钟`;
        if (h > 0) return `${h}小时`;
        return `${m}分钟`;
      }

      // 格式化结束时间
      function formatEndTime(date) {
        const h = date.getHours().toString().padStart(2, "0");
        const m = date.getMinutes().toString().padStart(2, "0");
        return `${h}:${m}`;
      }

      function randomByWeight(list) {
        const total = list.reduce((sum, item) => sum + item.weight, 0);
        let rand = Math.floor(Math.random() * total);
        for (let item of list) {
          rand -= item.weight;
          if (rand < 0) return item;
        }
        return list[0];
      }

      function generate() {
        if (countdownInterval) {
          clearInterval(countdownInterval);
        }

        const result = randomByWeight(quotes);
        const totalSeconds = generateRandomTime();
        endTime = new Date(Date.now() + totalSeconds * 1000);

        // 设置背景图片
        document.body.style.backgroundImage = `url("${result.img}")`;

        document.getElementById("text").innerHTML = `
        <img src="${result.img}" class="character-img" alt="${result.text}">
        <div>${result.text}</div>
        <div class="focus-time">专注时间: ${formatTotalTime(totalSeconds)}</div>
      `;

        document.getElementById("countdownText").innerText = formatEndTime(endTime);
        document.getElementById("endTimeHint").innerText = `结束于 ${formatEndTime(endTime)}`;

        const studyName = randomByWeight(studyList).name;
        document.getElementById("studyText").innerText = studyName;

        countdownInterval = setInterval(updateDisplay, 1000);
      }

      function updateDisplay() {
        const now = Date.now();
        const remaining = Math.max(0, endTime.getTime() - now);

        if (remaining > 0) {
          const totalSecs = Math.floor(remaining / 1000);
          const h = Math.floor(totalSecs / 3600);
          const m = Math.floor((totalSecs % 3600) / 60);
          const s = totalSecs % 60;
          document.getElementById("countdownText").innerText =
            `${h.toString().padStart(2, "0")}:${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
        } else {
          clearInterval(countdownInterval);
          document.getElementById("countdownText").innerText = "时间到！";
        }
      }

      function getStudyTask() {
        document.getElementById("studyText").innerText =
          randomByWeight(studyList).name;
      }
    </script>
  </body>
</html>
