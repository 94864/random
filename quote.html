<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>励志语录生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: system-ui;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 600px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }

        .quote {
            font-size: 20px;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #333;
            min-height: 60px;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            background: #2097f3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:active {
            background: #1a87d8;
        }

        .study-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .study-title {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .study-result {
            font-size: 22px;
            font-weight: bold;
            min-height: 30px;
            margin-bottom: 20px;
        }

        .study-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="quote" id="text">点击按钮生成一句励志语录</div>
        <button onclick="generate()">生成一句</button>
    </div>

    <div class="box study-box">
        <div class="study-title">今日学习方向</div>
        <div class="study-result" id="studyText">准备学习...</div>
        <button class="study-btn" onclick="getStudyTask()">随机选择</button>
    </div>

    <script>
        // ==================== 励志语录 ====================
        const quotes = [
            { text: "种一棵树最好的时间是十年前，其次是现在。", weight: 5 },
            { text: "你只管努力，剩下的交给时间。", weight: 4 },
            { text: "慢慢来，谁都有一个闪闪发光的过程。", weight: 4 },
            { text: "看似不起眼的日复一日，终会在将来的某一天，突然让你看到坚持的意义。", weight: 5 },
            { text: "不必羡慕他人，每个人都有自己的时区。", weight: 3 },
            { text: "半山腰总是最挤的，你得去山顶看看。", weight: 5 },
            { text: "努力的意义，就是以后的日子里，放眼望去，全都是自己喜欢的人和事。", weight: 4 },
            { text: "你不勇敢，没人替你坚强。", weight: 2 },
            { text: "凡是过往，皆为序章。", weight: 2 },
            { text: "自律者出众，懒散者出局。", weight: 5 },
        ]

        // ==================== 学习任务 ====================
        const studyList = [
            { name: "前端面试题", weight: 5 },
            { name: "前端JS+实战", weight: 2 },
            { name: "前端项目学习", weight: 1 },
            { name: "后端学习", weight: 5 },
            { name: "AI 学习", weight: 5 },
        ]

        // 通用权重随机（修复版，不会 undefined）
        function randomByWeight(list, key) {
            const total = list.reduce((sum, item) => sum + item.weight, 0)
            let rand = Math.floor(Math.random() * total)

            for (let item of list) {
                rand -= item.weight
                if (rand < 0) {
                    return key ? item[key] : item
                }
            }
            return list[0][key]
        }

        // 生成语录
        function generate() {
            const text = randomByWeight(quotes, 'text')
            document.getElementById('text').innerText = text
        }

        // 生成学习任务
        function getStudyTask() {
            const name = randomByWeight(studyList, 'name')
            document.getElementById("studyText").innerText = name
        }
    </script>
</body>

</html>
