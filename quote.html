<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>励志语录生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: system-ui;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 600px;
            text-align: center;
        }

        .quote {
            font-size: 20px;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #333;
            min-height: 60px;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            background: #2097f3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:active {
            background: #1a87d8;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="quote" id="text">点击按钮生成一句励志语录</div>
        <button onclick="generate()">生成一句</button>
    </div>

    <script>
        // 语录配置：weight 越大越容易出现
        const quotes = [
            { text: "种一棵树最好的时间是十年前，其次是现在。", weight: 5 },
            { text: "你只管努力，剩下的交给时间。", weight: 4 },
            { text: "慢慢来，谁都有一个闪闪发光的过程。", weight: 4 },
            { text: "看似不起眼的日复一日，终会在将来的某一天，突然让你看到坚持的意义。", weight: 5 },
            { text: "不必羡慕他人，每个人都有自己的时区。", weight: 3 },
            { text: "半山腰总是最挤的，你得去山顶看看。", weight: 5 },
            { text: "努力的意义，就是以后的日子里，放眼望去，全都是自己喜欢的人和事。", weight: 4 },
            { text: "你不勇敢，没人替你坚强。", weight: 2 },
            { text: "凡是过往，皆为序章。", weight: 2 },
            { text: "自律者出众，懒散者出局。", weight: 5 },
        ]

        // 按权重随机
        function randomByWeight(list) {
            const total = list.reduce((s, i) => s + i.weight, 0)
            let rand = Math.floor(Math.random() * total)

            for (let item of list) {
                rand -= item.weight
                if (rand < 0) return item.text
            }
        }

        // 生成并显示
        function generate() {
            const text = randomByWeight(quotes)
            document.getElementById('text').innerText = text
        }
    </script>
</body>

</html>
