<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>励志语录生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: system-ui;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 600px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }

        .quote {
            font-size: 20px;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #333;
            min-height: 60px;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            background: #2097f3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:active {
            background: #1a87d8;
        }

        .study-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .study-title {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .study-result {
            font-size: 22px;
            font-weight: bold;
            min-height: 30px;
            margin-bottom: 20px;
        }

        .study-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="quote" id="text">监督对象</div>
        <button onclick="generate()">请选择你的监督对象</button>
    </div>

    <div class="box study-box">
        <div class="study-title">学习任务</div>
        <div class="study-result" id="studyText">准备学习...</div>
        <button class="study-btn" onclick="getStudyTask()">随机选择</button>
    </div>

    <script>
        // ==================== 励志语录 ====================
        const quotes = [
            { text: "夏萧因", weight: 1 },
            { text: "许墨", weight: 1 },
            { text: "顾时夜", weight: 1 },
            { text: "易遇", weight: 1 },
            { text: "柏源", weight: 1 },
            { text: "夏彦", weight: 1 },
            { text: "李泽言", weight: 1 },
            { text: "许兔", weight: 1 },
            { text: "Ares", weight: 1 },
            { text: "许教授", weight: 1 },
        ];

        // ==================== 学习任务 ====================
        const studyList = [
            { name: "前端面试题", weight: 5 },
            { name: "前端JS+实战", weight: 2 },
            { name: "前端项目学习", weight: 1 },
            { name: "后端学习", weight: 5 },
            { name: "AI 学习", weight: 5 },
        ];

        // 通用权重随机（修复版，不会 undefined）
        function randomByWeight(list, key) {
            const total = list.reduce((sum, item) => sum + item.weight, 0);
            let rand = Math.floor(Math.random() * total);

            for (let item of list) {
                rand -= item.weight;
                if (rand < 0) {
                    return key ? item[key] : item;
                }
            }
            return list[0][key];
        }

        // 生成语录
        function generate() {
            const text = randomByWeight(quotes, "text");
            document.getElementById("text").innerText = text;
        }

        // 生成学习任务
        function getStudyTask() {
            const name = randomByWeight(studyList, "name");
            document.getElementById("studyText").innerText = name;
        }
    </script>
</body>

</html>
